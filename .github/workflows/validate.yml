name: Validate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check content
        run: npm run content:check

      - name: Type-check Astro
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test local preview
        shell: bash
        run: |
          npm run preview -- --host 127.0.0.1 --port 4322 > /tmp/astro-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

          ready=false
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:4322/" > /dev/null; then
              ready=true
              break
            fi

            sleep 1
          done

          if [ "$ready" != "true" ]; then
            cat /tmp/astro-preview.log
            exit 1
          fi

          SMOKE_BASE_URL="http://127.0.0.1:4322" npm run smoke
