name: Check External Links

on:
  schedule:
    - cron: "20 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-external-links
  cancel-in-progress: false

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check external links
        run: npm run links:check
