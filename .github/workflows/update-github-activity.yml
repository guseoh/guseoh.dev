name: Update GitHub Activity

on:
  schedule:
    # Every day at 15:10 UTC, which is 00:10 KST on the following day.
    - cron: "10 15 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: update-github-activity
  cancel-in-progress: false

jobs:
  update-github-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub contributions
        id: fetch_activity
        run: npm run github:contributions
        env:
          GH_CONTRIBUTIONS_TOKEN: ${{ secrets.GH_CONTRIBUTIONS_TOKEN }}
          GITHUB_CONTRIBUTIONS_USERNAME: guseoh

      - name: Commit updated contribution data
        id: commit_activity
        shell: bash
        run: |
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "committed=false" >> "$GITHUB_OUTPUT"
          echo "commit_hash=" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/github-contributions.json

          if git diff --cached --quiet; then
            echo "No GitHub Activity changes."
            exit 0
          fi

          git commit -m "chore: update github activity data"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "commit_hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy updated activity
        id: deploy_activity
        if: steps.commit_activity.outputs.changed == 'true'
        shell: bash
        run: |
          echo "run_id=" >> "$GITHUB_OUTPUT"
          echo "head_sha=" >> "$GITHUB_OUTPUT"

          target_sha="${COMMIT_HASH:?commit hash is required}"
          remote_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"

          if [ "$remote_sha" != "$target_sha" ]; then
            echo "origin/main is $remote_sha, expected $target_sha"
            exit 1
          fi

          gh workflow run deploy.yml --ref main

          for attempt in {1..12}; do
            run_id="$(gh run list \
              --workflow deploy.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha == \"$target_sha\") | .databaseId" \
              | head -n 1)"

            if [ -n "$run_id" ]; then
              echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
              echo "head_sha=$target_sha" >> "$GITHUB_OUTPUT"
              echo "Deploy workflow_dispatch run $run_id was created for $target_sha."
              exit 0
            fi

            echo "Waiting for deploy workflow_dispatch run for $target_sha (attempt $attempt/12)."
            sleep 5
          done

          echo "No deploy workflow_dispatch run was created for $target_sha."
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_HASH: ${{ steps.commit_activity.outputs.commit_hash }}

      - name: Write activity refresh summary
        if: always()
        shell: bash
        env:
          REFRESH_STATUS: ${{ steps.fetch_activity.outputs.status || 'unknown' }}
          REFRESH_SOURCE: ${{ steps.fetch_activity.outputs.source || 'unknown' }}
          REFRESH_DETAIL: ${{ steps.fetch_activity.outputs.detail }}
          DATA_CHANGED: ${{ steps.commit_activity.outputs.changed || 'false' }}
          COMMITTED: ${{ steps.commit_activity.outputs.committed || 'false' }}
          COMMIT_HASH: ${{ steps.commit_activity.outputs.commit_hash }}
          DEPLOY_OUTCOME: ${{ steps.deploy_activity.outcome || 'skipped' }}
          DEPLOY_RUN_ID: ${{ steps.deploy_activity.outputs.run_id }}
          DEPLOY_HEAD_SHA: ${{ steps.deploy_activity.outputs.head_sha }}
        run: |
          {
            echo "## GitHub Activity refresh"
            echo
            echo "- Time: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
            echo "- Status: \`$REFRESH_STATUS\`"
            echo "- Source: \`$REFRESH_SOURCE\`"
            echo "- Data changed: \`$DATA_CHANGED\`"
            echo "- Committed: \`$COMMITTED\`"
            echo "- Commit: \`${COMMIT_HASH:-none}\`"
            echo "- Deploy dispatch: \`$DEPLOY_OUTCOME\`"
            echo "- Deploy run: \`${DEPLOY_RUN_ID:-none}\`"
            echo "- Deploy head SHA: \`${DEPLOY_HEAD_SHA:-none}\`"
            if [ -n "$REFRESH_DETAIL" ]; then
              echo "- Detail: $REFRESH_DETAIL"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord
        if: always()
        continue-on-error: true
        run: node scripts/notify-discord.mjs
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: main
          REFRESH_STATUS: ${{ steps.fetch_activity.outputs.status || 'unknown' }}
          REFRESH_SOURCE: ${{ steps.fetch_activity.outputs.source || 'unknown' }}
          REFRESH_DETAIL: ${{ steps.fetch_activity.outputs.detail }}
          DATA_CHANGED: ${{ steps.commit_activity.outputs.changed || 'false' }}
          COMMITTED: ${{ steps.commit_activity.outputs.committed || 'false' }}
          COMMIT_HASH: ${{ steps.commit_activity.outputs.commit_hash }}
          DEPLOY_OUTCOME: ${{ steps.deploy_activity.outcome || 'skipped' }}
          DEPLOY_RUN_ID: ${{ steps.deploy_activity.outputs.run_id }}
          DEPLOY_HEAD_SHA: ${{ steps.deploy_activity.outputs.head_sha }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail degraded refresh or deploy dispatch
        if: >-
          always() &&
          (steps.fetch_activity.outputs.status == 'degraded' ||
          steps.deploy_activity.outcome == 'failure')
        run: |
          echo "GitHub Activity refresh or deploy dispatch degraded."
          exit 1
