name: 게시글 내용 오류
description: 게시글의 오탈자, 오래된 정보, 잘못된 코드나 설명을 알려주세요.
title: "[Content] "
labels:
  - content
  - correction
body:
  - type: input
    id: post-title
    attributes:
      label: 게시글 제목
      description: 문제가 있는 게시글 제목을 적어 주세요.
    validations:
      required: true

  - type: input
    id: post-url
    attributes:
      label: 게시글 URL
      description: 문제가 있는 게시글 주소를 붙여 주세요.
    validations:
      required: true

  - type: input
    id: source-path
    attributes:
      label: Markdown 파일 경로
      description: 자동으로 채워진 값이 있으면 그대로 두어도 됩니다.
    validations:
      required: false

  - type: input
    id: deployed-sha
    attributes:
      label: 배포 커밋
      description: 자동으로 채워진 값이 있으면 그대로 두어도 됩니다.
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: 오류가 있는 내용 또는 문단
      description: 어떤 내용이 문제인지 문장, 코드, 표 위치를 알려 주세요.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 제안하는 수정 방향
      description: 가능하다면 올바른 설명, 참고 링크, 재현 결과를 함께 적어 주세요.
    validations:
      required: false
